<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Video Safe Zone Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #f0e040;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .platform-btn {
    background: #2a2a4a;
    border: 2px solid #444;
    color: #ccc;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .platform-btn:hover { border-color: #f0e040; color: #f0e040; }
  .platform-btn.active { border-color: #f0e040; color: #f0e040; background: #3a3a20; }
  .platform-btn.none-btn { color: #888; }
  .platform-btn.none-btn.active { border-color: #888; color: #aaa; background: #2a2a2a; }

  .upload-area {
    border: 2px dashed #444;
    border-radius: 12px;
    padding: 32px 40px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    margin-bottom: 20px;
    background: #12122a;
    width: 100%;
    max-width: 400px;
  }
  .upload-area:hover { border-color: #f0e040; }
  .upload-area p { color: #888; font-size: 0.9rem; margin-top: 8px; }
  .upload-area .icon { font-size: 2.5rem; }
  #fileInput { display: none; }

  .viewer-wrap {
    position: relative;
    display: inline-block;
    line-height: 0;
  }

  /* Fixed display at 1080x1920 scaled down */
  .viewer-inner {
    position: relative;
    width: 337.5px;  /* 1080 * 0.3125 */
    height: 600px;   /* 1920 * 0.3125 */
    background: #000;
    overflow: hidden;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  #overlayImg {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    pointer-events: none;
    opacity: 0.55;
    mix-blend-mode: normal;
    transition: opacity 0.2s;
  }

  .opacity-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    color: #aaa;
  }
  .opacity-row input { accent-color: #f0e040; width: 130px; }
  .opacity-row span { color: #f0e040; font-weight: 700; min-width: 2.5em; }

  .video-controls {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    justify-content: center;
  }
  .vid-btn {
    background: #2a2a4a;
    border: 1px solid #444;
    color: #ccc;
    padding: 6px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .vid-btn:hover { background: #3a3a60; border-color: #f0e040; color: #f0e040; }

  .placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
    font-size: 0.9rem;
    flex-direction: column;
    gap: 8px;
  }
  .placeholder .big { font-size: 2rem; }

  .info {
    margin-top: 16px;
    font-size: 0.75rem;
    color: #555;
    text-align: center;
  }
</style>
</head>
<body>

<h1>📐 Social Safe Zone Viewer</h1>

<div class="controls" id="platformBtns">
  <button class="platform-btn none-btn active" data-platform="none">✕ No Overlay</button>
  <button class="platform-btn" data-platform="universal">🌐 Universal</button>
  <button class="platform-btn" data-platform="youtube">▶ YouTube Shorts</button>
  <button class="platform-btn" data-platform="tiktok">♪ TikTok</button>
  <button class="platform-btn" data-platform="instagram">📷 Instagram</button>
</div>

<div class="opacity-row">
  <label for="opacitySlider">Overlay opacity:</label>
  <input type="range" id="opacitySlider" min="10" max="100" value="55">
  <span id="opacityVal">55%</span>
</div>

<div class="upload-area" id="uploadArea">
  <div class="icon">🎬</div>
  <strong>Click to upload a vertical video</strong>
  <p>MP4, MOV, WebM — 9:16 format recommended</p>
  <input type="file" id="fileInput" accept="video/*">
</div>

<div class="viewer-wrap" id="viewerWrap" style="display:none;">
  <div class="viewer-inner">
    <video id="videoEl" playsinline></video>
    <img id="overlayImg" src="" alt="safe zone overlay" style="display:none;">
  </div>
  <div class="video-controls">
    <button class="vid-btn" id="playPauseBtn">⏸ Pause</button>
    <button class="vid-btn" id="muteBtn">🔊 Mute</button>
    <button class="vid-btn" id="changeVideoBtn">↩ Change Video</button>
  </div>
</div>

<p class="info">and placed in the same folder as this HTML file. Name them: <code>universal.png</code>, <code>youtube.png</code>, <code>tiktok.png</code>, <code>instagram.png</code></p>

<script>
  const fileInput = document.getElementById('fileInput');
  const uploadArea = document.getElementById('uploadArea');
  const viewerWrap = document.getElementById('viewerWrap');
  const videoEl = document.getElementById('videoEl');
  const overlayImg = document.getElementById('overlayImg');
  const playPauseBtn = document.getElementById('playPauseBtn');
  const muteBtn = document.getElementById('muteBtn');
  const changeVideoBtn = document.getElementById('changeVideoBtn');
  const opacitySlider = document.getElementById('opacitySlider');
  const opacityVal = document.getElementById('opacityVal');

  // Map platform keys to image filenames
  const overlayMap = {
    universal: 'universal.png',
    youtube:   'youtube.png',
    tiktok:    'tiktok.png',
    instagram: 'instagram.png',
  };

  let currentPlatform = 'none';
  let videoObjectURL = null;

  // Upload
  uploadArea.addEventListener('click', () => fileInput.click());
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = '#f0e040'; });
  uploadArea.addEventListener('dragleave', () => uploadArea.style.borderColor = '#444');
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('video/')) loadVideo(f);
    uploadArea.style.borderColor = '#444';
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadVideo(fileInput.files[0]);
  });

  function loadVideo(file) {
    if (videoObjectURL) URL.revokeObjectURL(videoObjectURL);
    videoObjectURL = URL.createObjectURL(file);
    videoEl.src = videoObjectURL;
    videoEl.play();
    uploadArea.style.display = 'none';
    viewerWrap.style.display = 'block';
    playPauseBtn.textContent = '⏸ Pause';
  }

  // Platform buttons
  document.getElementById('platformBtns').addEventListener('click', e => {
    const btn = e.target.closest('.platform-btn');
    if (!btn) return;
    const platform = btn.dataset.platform;
    document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPlatform = platform;
    updateOverlay();
  });

  function updateOverlay() {
    if (currentPlatform === 'none') {
      overlayImg.style.display = 'none';
    } else {
      overlayImg.src = overlayMap[currentPlatform];
      overlayImg.style.display = 'block';
    }
  }

  // Opacity
  opacitySlider.addEventListener('input', () => {
    const v = opacitySlider.value;
    opacityVal.textContent = v + '%';
    overlayImg.style.opacity = v / 100;
  });

  // Video controls
  playPauseBtn.addEventListener('click', () => {
    if (videoEl.paused) { videoEl.play(); playPauseBtn.textContent = '⏸ Pause'; }
    else { videoEl.pause(); playPauseBtn.textContent = '▶ Play'; }
  });

  muteBtn.addEventListener('click', () => {
    videoEl.muted = !videoEl.muted;
    muteBtn.textContent = videoEl.muted ? '🔇 Unmute' : '🔊 Mute';
  });

  changeVideoBtn.addEventListener('click', () => {
    videoEl.pause();
    videoEl.src = '';
    uploadArea.style.display = 'block';
    viewerWrap.style.display = 'none';
    fileInput.value = '';
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && videoEl.src) {
      e.preventDefault();
      playPauseBtn.click();
    }
  });
</script>
</body>
</html>
